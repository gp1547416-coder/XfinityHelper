<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wifi Master Support Hub</title>
    <style>
        :root {
            --primary: #0066ff;
            --bg-dark: #f4f6f9;
            --chat-bg: #ffffff;
            --bot-bubble: #f0f2f5;
            --user-bubble: #0066ff;
            --agent-bubble: #343a40;
            --success: #28a745;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .window {
            width: 400px;
            height: 600px;
            background: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e1e4e8;
        }

        .header {
            padding: 16px;
            font-weight: 600;
            border-bottom: 1px solid #e1e4e8;
            font-size: 1.05em;
        }

        .status-banner {
            background: #e2f0d9;
            color: var(--success);
            padding: 8px 16px;
            font-size: 0.85em;
            font-weight: bold;
            border-bottom: 1px solid #c5e1b7;
            display: none;
        }

        .feed {
            flex: 1;
            padding: 18px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafafa;
        }

        .msg {
            max-width: 80%;
            padding: 11px 15px;
            border-radius: 18px;
            font-size: 0.95em;
            line-height: 1.4;
        }

        .msg a { color: inherit; text-decoration: underline; font-weight: 600; }
        .user a { color: #ffffff; }
        .agent a { color: #66ccff; }

        .bot { background: var(--bot-bubble); color: #333333; align-self: flex-start; border-top-left-radius: 4px; }
        .user { background: var(--user-bubble); color: white; align-self: flex-end; border-top-right-radius: 4px; }
        .agent { background: var(--agent-bubble); color: white; align-self: flex-start; border-top-left-radius: 4px; }
        
        .agent-only-view .user { align-self: flex-start; background: #e0e0e0; color: #333333; }
        .agent-only-view .user a { color: #0066ff; }
        .agent-only-view .agent { align-end: flex-end; align-self: flex-end; background: var(--agent-bubble); }

        .typing-indicator {
            align-self: flex-start;
            background: transparent;
            color: #888888;
            font-size: 0.85em;
            font-style: italic;
            padding: 2px 10px;
            display: none;
        }

        .presets {
            padding: 14px;
            background: #ffffff;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-top: 1px solid #e1e4e8;
        }

        .btn {
            background: #ffffff;
            border: 1px solid #0066ff;
            color: #0066ff;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
        }

        .input-bar {
            display: flex;
            padding: 12px;
            background: #ffffff;
            gap: 8px;
            border-top: 1px solid #e1e4e8;
        }

        input {
            flex: 1;
            background: #f0f2f5;
            border: 1px solid #e1e4e8;
            color: #333333;
            padding: 10px 14px;
            border-radius: 20px;
            outline: none;
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="window" id="chatWindow">
    <div class="header" id="chatHeader">Wifi Master Assistant</div>
    <div class="status-banner" id="statusBanner">🟢 Connected to Live Support</div>
    <div class="feed" id="chatFeed"></div>
    <div class="typing-indicator" id="typingIndicator">Typing...</div>
    <div class="presets" id="presetBox"></div>
    <div class="input-bar" id="inputBar" style="display: none;">
        <input type="text" id="chatInput" placeholder="Type a message...">
        <button class="send-btn" id="sendBtn">Send</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, collection, addDoc, onSnapshot, updateDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCAt3wIzy7Mhx13CHTKAi2RmM2KjowZgiM",
        authDomain: "xfinityhelper-85a05.firebaseapp.com",
        databaseURL: "https://xfinityhelper-85a05-default-rtdb.firebaseio.com",
        projectId: "xfinityhelper-85a05",
        storageBucket: "xfinityhelper-85a05.firebasestorage.app",
        messagingSenderId: "329336506874",
        appId: "1:329336506874:web:a7c87ce2731309edd93c43",
        measurementId: "G-2J962Y9Q1M"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // Core document targets
    const sessionDocRef = doc(db, "chats", "wifimaster-session");
    const messagesCollectionRef = collection(db, "chats", "wifimaster-session", "messages");

    const chatWindow = document.getElementById('chatWindow');
    const chatHeader = document.getElementById('chatHeader');
    const chatFeed = document.getElementById('chatFeed');
    const statusBanner = document.getElementById('statusBanner');
    const typingIndicator = document.getElementById('typingIndicator');
    const presetBox = document.getElementById('presetBox');
    const inputBar = document.getElementById('inputBar');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    const urlParams = new URLSearchParams(window.location.search);
    let isAgentMode = (urlParams.get('role') === 'agent');

    // Keep track of IDs we already rendered locally so we never duplicate
    const renderedMessageIds = new Set();

    function initInterface() {
        if (isAgentMode) {
            chatWindow.classList.add('agent-only-view');
            chatHeader.innerText = "💻 Agent Control Desktop (You)";
            chatHeader.style.background = "#343a40";
            chatHeader.style.color = "white";
            statusBanner.innerText = "🟢 Secure Agent Line Active";
            statusBanner.style.background = "#343a40";
            statusBanner.style.color = "#66ff66";
            statusBanner.style.borderColor = "#4b5563";
            statusBanner.style.display = "block";
            inputBar.style.display = "flex";
            sendBtn.style.background = "#343a40";
            
            // Clean typing rules without erasing historic message items
            updateDoc(sessionDocRef, { customerTyping: false, agentTyping: false }).catch(() => {
                // Fallback if document doesn't exist yet
                setDoc(sessionDocRef, { customerTyping: false, agentTyping: false });
            });
        } else {
            addMessage(chatFeed, "Hello! Welcome to Wifi Master support. What seems to be the trouble today?", "bot");
            renderPresets();
        }

        // Listener 1: Monitor Typing Metas
        onSnapshot(sessionDocRef, (snapshot) => {
            if (!snapshot.exists()) return;
            const data = snapshot.data();
            if (isAgentMode) {
                typingIndicator.innerText = "Customer is typing...";
                typingIndicator.style.display = data.customerTyping ? "block" : "none";
            } else {
                typingIndicator.innerText = "Agent is typing...";
                typingIndicator.style.display = data.agentTyping ? "block" : "none";
            }
        });

        // Listener 2: Safe Real-Time Ordered Message Streaming
        const q = query(messagesCollectionRef, orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added") {
                    const messageId = change.doc.id;
                    // Strict duplication guard rule
                    if (!renderedMessageIds.has(messageId)) {
                        renderedMessageIds.add(messageId);
                        const msgData = change.doc.data();
                        addMessage(chatFeed, msgData.text, msgData.sender);
                    }
                }
            });
        });
    }

    function renderPresets() {
        presetBox.innerHTML = '';
        const options = [
            { text: "My speeds are slow", action: () => handleUserSelection("My speeds are slow", "We recommend running a powercycle. If that fails, click below to page a live operator.") },
            { text: "Chat with a live agent", action: () => startCustomerHandover() }
        ];
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt.text;
            btn.onclick = opt.action;
            presetBox.appendChild(btn);
        });
    }

    function handleUserSelection(userTxt, botResponse) {
        addMessage(chatFeed, userTxt, 'user');
        presetBox.innerHTML = '';
        setTimeout(() => {
            addMessage(chatFeed, botResponse, 'bot');
            const returnBtn = document.createElement('button');
            returnBtn.className = 'btn';
            returnBtn.innerText = "Chat with a live agent";
            returnBtn.onclick = startCustomerHandover;
            presetBox.appendChild(returnBtn);
        }, 600);
    }

    function startCustomerHandover() {
        addMessage(chatFeed, "Chat with a live agent", 'user');
        presetBox.innerHTML = '';
        addMessage(chatFeed, "Locating an open support desk queue...", 'bot');
        
        setTimeout(() => {
            chatHeader.innerText = "Live Customer Chat Line";
            statusBanner.style.display = "block";
            inputBar.style.display = "flex";
            addMessage(chatFeed, "Connected! You are now chatting with a live agent.", "bot");
        }, 1200);
    }

    let typingTimeout;
    chatInput.oninput = () => {
        const typingField = isAgentMode ? { agentTyping: true } : { customerTyping: true };
        const stopField = isAgentMode ? { agentTyping: false } : { customerTyping: false };
        
        updateDoc(sessionDocRef, typingField);
        
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            updateDoc(sessionDocRef, stopField);
        }, 1500);
    };

    async function handleSend() {
        const msgText = chatInput.value.trim();
        if(!msgText) return;

        chatInput.value = '';
        const roleLabel = isAgentMode ? 'agent' : 'user';
        const stopTypingField = isAgentMode ? { agentTyping: false } : { customerTyping: false };

        try {
            // Turn off typing notification state
            await updateDoc(sessionDocRef, stopTypingField);
            
            // Push message directly into sub-collection with server time execution stamp
            await addDoc(messagesCollectionRef, {
                text: msgText,
                sender: roleLabel,
                timestamp: serverTimestamp()
            });
        } catch(err) {
            console.log("Database write error: ", err);
        }
    }

    function formatText(raw) {
        let txt = raw.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        txt = txt.replace(/(\b(https?):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig, '<a href="$1" target="_blank">$1</a>');
        return txt.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }

    function addMessage(feed, text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = formatText(text);
        feed.appendChild(div);
        feed.scrollTop = feed.scrollHeight;
    }

    sendBtn.onclick = handleSend;
    chatInput.onkeydown = (e) => { if(e.key === 'Enter') handleSend(); };

    initInterface();
</script>

</body>
</html>
