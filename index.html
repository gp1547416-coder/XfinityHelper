<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wifi Master Support Hub</title>
    <style>
        :root {
            --primary: #0066ff;
            --bg-dark: #f4f6f9;
            --chat-bg: #ffffff;
            --text-main: #333333;
            --bot-bubble: #f0f2f5;
            --user-bubble: #0066ff;
            --agent-bubble: #343a40;
            --success: #28a745;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .window {
            width: 400px;
            height: 600px;
            background: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e1e4e8;
        }

        .header {
            padding: 16px;
            font-weight: 600;
            border-bottom: 1px solid #e1e4e8;
            font-size: 1.05em;
        }

        .status-banner {
            background: #e2f0d9;
            color: var(--success);
            padding: 8px 16px;
            font-size: 0.85em;
            font-weight: bold;
            border-bottom: 1px solid #c5e1b7;
            display: none;
        }

        .feed {
            flex: 1;
            padding: 18px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafafa;
        }

        .msg {
            max-width: 80%;
            padding: 11px 15px;
            border-radius: 18px;
            font-size: 0.95em;
            line-height: 1.4;
        }

        .msg a { color: inherit; text-decoration: underline; font-weight: 600; }
        .user a { color: #ffffff; }
        .agent a { color: #66ccff; }

        .bot { background: var(--bot-bubble); color: #333333; align-self: flex-start; border-top-left-radius: 4px; }
        .user { background: var(--user-bubble); color: white; align-self: flex-end; border-top-right-radius: 4px; }
        .agent { background: var(--agent-bubble); color: white; align-self: flex-start; border-top-left-radius: 4px; }
        
        /* Agent UI perspective modifiers */
        .agent-only-view .user { align-self: flex-start; background: #e0e0e0; color: #333333; }
        .agent-only-view .user a { color: #0066ff; }
        .agent-only-view .agent { align-self: flex-end; background: var(--agent-bubble); }

        .typing-indicator {
            align-self: flex-start;
            background: transparent;
            color: #888888;
            font-size: 0.85em;
            font-style: italic;
            padding: 2px 10px;
            display: none;
        }

        .presets {
            padding: 14px;
            background: #ffffff;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-top: 1px solid #e1e4e8;
        }

        .btn {
            background: #ffffff;
            border: 1px solid #0066ff;
            color: #0066ff;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
        }

        .input-bar {
            display: flex;
            padding: 12px;
            background: #ffffff;
            gap: 8px;
            border-top: 1px solid #e1e4e8;
        }

        input {
            flex: 1;
            background: #f0f2f5;
            border: 1px solid #e1e4e8;
            color: #333333;
            padding: 10px 14px;
            border-radius: 20px;
            outline: none;
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="window" id="chatWindow">
    <div class="header" id="chatHeader">Wifi Master Assistant</div>
    <div class="status-banner" id="statusBanner">🟢 Connected to Live Support</div>
    <div class="feed" id="chatFeed"></div>
    <div class="typing-indicator" id="typingIndicator">Typing...</div>
    <div class="presets" id="presetBox"></div>
    <div class="input-bar" id="inputBar" style="display: none;">
        <input type="text" id="chatInput" placeholder="Type a message...">
        <button class="send-btn" id="sendBtn">Send</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chatWindow');
    const chatHeader = document.getElementById('chatHeader');
    const chatFeed = document.getElementById('chatFeed');
    const statusBanner = document.getElementById('statusBanner');
    const typingIndicator = document.getElementById('typingIndicator');
    const presetBox = document.getElementById('presetBox');
    const inputBar = document.getElementById('inputBar');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    // Read URL query string parameter configuration
    const urlParams = new URLSearchParams(window.location.search);
    const userRole = urlParams.get('role'); // Pulls value assigned to "?role="

    let isAgentMode = (userRole === 'agent');

    function initInterface() {
        if (isAgentMode) {
            // Setup private single-screen Agent environment
            chatWindow.classList.add('agent-only-view');
            chatHeader.innerText = "💻 Agent Control Desktop (You)";
            chatHeader.style.background = "#343a40";
            chatHeader.style.color = "white";
            statusBanner.innerText = "🟢 Secure Agent Line Active";
            statusBanner.style.background = "#343a40";
            statusBanner.style.color = "#66ff66";
            statusBanner.style.borderColor = "#4b5563";
            statusBanner.style.display = "block";
            inputBar.style.display = "flex";
            sendBtn.style.background = "#343a40";
            
            addMessage(chatFeed, "System: Active monitoring online. Awaiting customer contact vectors...", "bot");
            
            // Simulated user connection for validation testing
            setTimeout(() => {
                typingIndicator.innerText = "Customer is typing...";
                typingIndicator.style.display = "block";
                setTimeout(() => {
                    typingIndicator.style.display = "none";
                    addMessage(chatFeed, "Hello, my internet speeds are terrible. Can you link me to a speed test profile?", "user");
                }, 2000);
            }, 1500);

        } else {
            // Standard Customer Interface
            addMessage(chatFeed, "Hello! Welcome to Wifi Master support. What seems to be the trouble today?", "bot");
            renderPresets();
        }
    }

    function renderPresets() {
        presetBox.innerHTML = '';
        const options = [
            { text: "My speeds are slow", action: () => handleUserSelection("My speeds are slow", "We recommend unplugging your gateway for 30 seconds to run a powercycle. If that fails, touch the option below to flag a live agent assignment.") },
            { text: "Chat with a live agent", action: () => startCustomerHandover() }
        ];

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt.text;
            btn.onclick = opt.action;
            presetBox.appendChild(btn);
        });
    }

    function handleUserSelection(userTxt, botResponse) {
        addMessage(chatFeed, userTxt, 'user');
        presetBox.innerHTML = '';
        setTimeout(() => {
            addMessage(chatFeed, botResponse, 'bot');
            const returnBtn = document.createElement('button');
            returnBtn.className = 'btn';
            returnBtn.innerText = "Chat with a live agent";
            returnBtn.onclick = startCustomerHandover;
            presetBox.appendChild(returnBtn);
        }, 600);
    }

    function startCustomerHandover() {
        addMessage(chatFeed, "Chat with a live agent", 'user');
        presetBox.innerHTML = '';
        addMessage(chatFeed, "Locating an open support desk queue...", 'bot');
        
        setTimeout(() => {
            chatHeader.innerText = "Live Customer Chat Line";
            statusBanner.style.display = "block";
            inputBar.style.display = "flex";
            addMessage(chatFeed, "Connected! An agent has accepted your handoff queue. Type your message below to begin troubleshooting.", "bot");
        }, 1200);
    }

    function formatText(raw) {
        let txt = raw.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        txt = txt.replace(/(\b(https?):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig, '<a href="$1" target="_blank">$1</a>');
        return txt.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }

    function addMessage(feed, text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = formatText(text);
        feed.appendChild(div);
        feed.scrollTop = feed.scrollHeight;
    }

    function handleSend() {
        const msg = chatInput.value.trim();
        if(msg) {
            addMessage(chatFeed, msg, isAgentMode ? 'agent' : 'user');
            chatInput.value = '';
        }
    }

    sendBtn.onclick = handleSend;
    chatInput.onkeydown = (e) => { if(e.key === 'Enter') handleSend(); };

    initInterface();
</script>

</body>
</html>
